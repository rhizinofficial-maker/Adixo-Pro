<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adixo Down - Premium Extraction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; min-height: 100vh; font-family: sans-serif; }
        .bg-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(0, 255, 128, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 255, 128, 0.05) 1px, transparent 1px); }
        .glow-box { box-shadow: 0 0 20px rgba(0, 255, 128, 0.2); border: 1px solid rgba(0, 255, 128, 0.4); }
        .quality-btn { transition: all 0.3s; border: 1px solid #333; }
        .quality-btn:hover { border-color: #00ff80; box-shadow: 0 0 15px rgba(0,255,128,0.3); transform: translateY(-3px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #00ff80; border-radius: 10px; }
        
        /* 18-Second 3D Intro/Outro Loop Animation for Creator Text */
        .creator-text {
            display: inline-block;
            animation: deepakBurst 18s infinite ease-in-out;
            transform-origin: center;
        }
        @keyframes deepakBurst {
            0% { transform: perspective(400px) rotateX(90deg) scale(0.5); opacity: 0; filter: blur(10px); color: #333; }
            5% { transform: perspective(400px) rotateX(-10deg) scale(1.1); opacity: 1; filter: blur(0px); color: #fff; text-shadow: 0 0 20px #00ff80, 0 0 40px #00ff80; }
            8% { transform: perspective(400px) rotateX(0deg) scale(1); opacity: 1; filter: blur(0px); color: #00ff80; text-shadow: 0 0 10px #00ff80; }
            83.33% { transform: perspective(400px) rotateX(0deg) scale(1); opacity: 1; filter: blur(0px); color: #00ff80; text-shadow: 0 0 10px #00ff80; } /* Stays still for 15s */
            88% { transform: perspective(400px) rotateX(0deg) scale(1.1); opacity: 1; filter: blur(5px); color: #fff; text-shadow: 0 0 30px #00ff80; } /* Outro Charge Up */
            100% { transform: perspective(400px) rotateX(-90deg) scale(0); opacity: 0; filter: blur(20px); color: #000; } /* Disappears for 3s */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 md:p-10 relative">
    <div class="fixed inset-0 bg-grid -z-10"></div>
    
    <div class="w-full max-w-lg p-6 md:p-8 rounded-2xl glow-box bg-black/80 backdrop-blur-xl mb-10 mt-5">
        <div class="text-center mb-6 h-16 flex flex-col justify-center">
            <h1 class="text-4xl font-black text-[#00ff80] tracking-widest uppercase mb-1">Adixo Down</h1>
            <p class="text-xs font-mono font-bold tracking-widest creator-text uppercase mt-1">Created By Deepak Jangir</p>
        </div>

        <div id="inputArea" class="space-y-4">
            <input type="text" id="videoUrl" placeholder="Paste YouTube Link..." class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl text-[#00ff80] focus:outline-none focus:border-[#00ff80] text-center font-mono">
            <button onclick="fetchFormats()" id="fetchBtn" class="w-full py-4 bg-[#00ff80] text-black font-black rounded-xl hover:bg-[#00cc66] transition-all uppercase shadow-[0_0_15px_#00ff80]">Analyze Data</button>
        </div>

        <div id="results" class="hidden mt-8 space-y-6">
            <div class="bg-gray-900 p-3 rounded-xl border border-gray-800 shadow-inner">
                <img id="videoThumb" src="" class="w-full rounded-lg mb-3 border border-gray-700">
                <h3 id="videoTitle" class="text-sm font-bold text-center px-2 text-gray-200"></h3>
            </div>

            <div id="qualitySection">
                <p class="text-[10px] text-gray-500 mb-3 font-mono text-center tracking-widest uppercase italic">Select Target Resolution</p>
                <div id="qualityButtons" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>
    </div>

    <div id="downloadModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
        <div class="glow-box bg-gray-950 p-8 rounded-2xl max-w-sm w-[90%] text-center flex flex-col items-center border-2 border-[#00ff80] transform scale-105 transition-all">
            <h2 class="text-xl font-black text-[#00ff80] mb-1 uppercase tracking-widest drop-shadow-[0_0_10px_#00ff80]">Thanks For Downloading</h2>
            <p class="text-[10px] text-gray-400 font-mono mb-6 uppercase tracking-wider">Deepak Jangir Server is Processing...</p>
            
            <div class="w-full flex justify-between items-end text-[#00ff80] font-mono mb-3">
                <div class="flex flex-col text-left">
                    <span id="speedDisplay" class="text-[10px] opacity-80 uppercase tracking-tighter">SPEED: 0 KB/s</span>
                    <span id="sizeDisplay" class="text-[11px] text-gray-300 uppercase tracking-widest mt-1 font-bold">SIZE: --</span>
                </div>
                <span id="percentText" class="text-4xl font-black drop-shadow-[0_0_15px_#00ff80]">0%</span>
            </div>
            
            <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden border border-gray-700 mb-4">
                <div id="progressBar" class="bg-[#00ff80] h-full w-0 transition-all duration-300 shadow-[0_0_15px_#00ff80]"></div>
            </div>
            
            <p id="statusMsg" class="text-center text-[10px] mt-1 text-gray-400 font-mono uppercase tracking-widest animate-pulse">STARTING CONNECTION...</p>
            
            <div id="timerContainer" class="hidden mt-5 w-full bg-gray-900 border border-[#00ff80]/50 text-gray-300 px-4 py-3 rounded-lg font-mono text-xs uppercase tracking-widest">
                Refreshing in <span id="refreshTimer" class="font-bold text-lg text-[#00ff80] mx-1">3</span> seconds
            </div>
        </div>
    </div>

    <script>
        async function fetchFormats() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('fetchBtn');
            if(!url) return alert("Link copy karke yaha daalo!");

            btn.innerText = "DECRYPTING SIGNAL..."; btn.disabled = true;
            
            try {
                const res = await fetch('/get_formats', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({url}) 
                });
                const data = await res.json();
                
                btn.innerText = "Analyze Data"; btn.disabled = false;
                if(data.status === 'success') {
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('videoThumb').src = data.thumbnail;
                    const container = document.getElementById('qualityButtons');
                    container.innerHTML = '';
                    data.formats.forEach(f => {
                        const b = document.createElement('button');
                        b.className = "quality-btn p-3 bg-gray-800 rounded-xl flex flex-col items-center justify-center gap-1 group overflow-hidden relative";
                        b.innerHTML = `
                            <span class="text-white text-xl font-black group-hover:text-[#00ff80] transition-colors">${f.resolution}</span>
                            <span class="text-[10px] bg-black/50 px-2 py-0.5 rounded text-gray-300 mt-1 border border-gray-700">${f.size}</span>
                            <span class="text-[9px] text-[#00ff80] tracking-tighter uppercase mt-1">+ HQ AUDIO</span>
                        `;
                        b.onclick = () => startDownload(url, f.format_id);
                        container.appendChild(b);
                    });
                    document.getElementById('results').classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            } catch (e) {
                alert("Signal Loss! Check your link.");
                btn.disabled = false; btn.innerText = "Analyze Data";
            }
        }

        function startDownload(url, format_id) {
            // Open Thanks Pop-Up Modal
            document.getElementById('downloadModal').classList.remove('hidden');
            document.body.style.overflow = "hidden"; // background scroll band karne ke liye
            
            fetch('/download', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({url, format_id}) 
            });
            
            const timer = setInterval(async () => {
                const res = await fetch('/progress');
                const data = await res.json();
                document.getElementById('progressBar').style.width = data.percent + '%';
                document.getElementById('percentText').innerText = Math.floor(data.percent) + '%';
                document.getElementById('speedDisplay').innerText = 'SPEED: ' + data.speed;
                document.getElementById('sizeDisplay').innerText = 'SIZE: ' + data.size; 
                document.getElementById('statusMsg').innerText = data.status;
                
                // Finish Hone par timer chalu karo
                if(data.status === "Finished") { 
                    clearInterval(timer);
                    document.getElementById('statusMsg').innerText = "✓ EXTRACTION & MERGE COMPLETE";
                    document.getElementById('statusMsg').classList.add('text-[#00ff80]');
                    document.getElementById('statusMsg').classList.remove('animate-pulse');
                    
                    document.getElementById('timerContainer').classList.remove('hidden');
                    let count = 3;
                    document.getElementById('refreshTimer').innerText = count;
                    
                    const countdown = setInterval(() => {
                        count--;
                        document.getElementById('refreshTimer').innerText = count;
                        if(count <= 0) {
                            clearInterval(countdown);
                            window.location.reload(); // 3 second baad automatic refresh
                        }
                    }, 1000);
                }
            }, 1000);
        }
    </script>
</body>
</html>
